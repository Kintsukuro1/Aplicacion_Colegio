{% load static %}
<link rel="stylesheet" href="{% static 'css/profesor/libro_clases.css' %}">

<div class="content-wrapper">
    <div class="page-header">
        <h1>Libro de Clases Digital</h1>
        <p class="subtitle">Registro diario, firma docente e historial por establecimiento</p>
    </div>

    <div class="libro-container">
        <div class="filtros-section">
            <div class="filtros-form" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px;">
                <div class="filtro-item">
                    <label for="clase_id">Clase</label>
                    <select id="clase_id">
                        <option value="">Seleccione una clase</option>
                        {% for clase in clases %}
                        <option value="{{ clase.id }}" {% if filtro_clase_id|stringformat:'s' == clase.id|stringformat:'s' %}selected{% endif %}>
                            {{ clase.curso.nombre }} - {{ clase.asignatura.nombre }}{% if clase.profesor %} - {{ clase.profesor.get_full_name }}{% endif %}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="filtro-item">
                    <label for="fecha_registro">Fecha</label>
                    <input id="fecha_registro" type="date" value="{{ fecha_filtro }}">
                </div>
                <div class="filtro-item">
                    <label for="numero_clase">Numero de bloque</label>
                    <input id="numero_clase" type="number" min="1" step="1" value="1">
                </div>
            </div>
        </div>

        {% if not libro_read_only %}
        <div class="tabla-container" style="margin-bottom: 16px;">
            <h4 style="margin: 0 0 10px 0;">Registrar clase</h4>
            <div style="display:grid; gap: 10px;">
                <label for="contenido_tratado">Contenido tratado</label>
                <textarea id="contenido_tratado" rows="4" placeholder="Describe los objetivos, actividades y avances de la clase"></textarea>

                <label for="tarea_asignada">Tarea asignada</label>
                <textarea id="tarea_asignada" rows="2" placeholder="Opcional"></textarea>

                <label for="observaciones">Observaciones</label>
                <textarea id="observaciones" rows="2" placeholder="Opcional"></textarea>

                <div style="display:flex; gap:10px; flex-wrap:wrap;">
                    <button id="btn_guardar" type="button" class="btn-exportar">Guardar registro</button>
                    <button id="btn_firmar" type="button" class="btn-exportar btn-excel" disabled>Firmar ultimo registro</button>
                </div>
            </div>
        </div>
        {% endif %}

        <div id="estado_libro" class="mensaje-inicial" style="display:none;"></div>

        <div class="tabla-container">
            <div class="tabla-scroll">
                <table class="tabla-libro">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Curso</th>
                            <th>Asignatura</th>
                            <th>Bloque</th>
                            <th>Contenido</th>
                            <th>Firma</th>
                        </tr>
                    </thead>
                    <tbody id="tabla_registros_body">
                        <tr><td colspan="6">Seleccione filtros para cargar registros.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        {% if libro_read_only %}
        <div class="acciones-libro" style="margin-top: 14px; display:flex; gap:10px; flex-wrap:wrap;">
            <button type="button" class="btn-exportar" id="btn_export_csv">Exportar Superintendencia CSV</button>
            <button type="button" class="btn-exportar btn-excel" id="btn_export_xlsx">Exportar Superintendencia XLSX</button>
            <button type="button" class="btn-exportar" id="btn_export_pdf">Exportar Superintendencia PDF</button>
            <button type="button" class="btn-exportar btn-excel" id="btn_export_sige">Exportar Superintendencia SIGE</button>
        </div>
        {% endif %}
    </div>
</div>

<script>
(() => {
    const readOnly = {{ libro_read_only|yesno:"true,false" }};
    const roleScope = "{{ libro_role_scope|default:'profesor' }}";
    const claseInput = document.getElementById('clase_id');
    const fechaInput = document.getElementById('fecha_registro');
    const numeroClaseInput = document.getElementById('numero_clase');
    const contenidoInput = document.getElementById('contenido_tratado');
    const tareaInput = document.getElementById('tarea_asignada');
    const observacionesInput = document.getElementById('observaciones');
    const btnGuardar = document.getElementById('btn_guardar');
    const btnFirmar = document.getElementById('btn_firmar');
    const estado = document.getElementById('estado_libro');
    const tablaBody = document.getElementById('tabla_registros_body');
    const btnExportCsv = document.getElementById('btn_export_csv');
    const btnExportXlsx = document.getElementById('btn_export_xlsx');
    const btnExportPdf = document.getElementById('btn_export_pdf');
    const btnExportSige = document.getElementById('btn_export_sige');

    let ultimoRegistroId = null;

    const endpointList = roleScope === 'profesor'
        ? '/api/profesor/libro-clases/'
        : (roleScope === 'coordinador' ? '/api/coordinador/libro-clases/' : '/api/admin-escolar/libro-clases/');

    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) {
            return parts.pop().split(';').shift();
        }
        return '';
    }

    function setStatus(message, isError = false) {
        estado.style.display = 'block';
        estado.innerHTML = `<p style="margin:0; color:${isError ? '#b91c1c' : '#14532d'}">${message}</p>`;
    }

    function clearStatus() {
        estado.style.display = 'none';
        estado.innerHTML = '';
    }

    function renderRows(registros) {
        if (!registros || registros.length === 0) {
            tablaBody.innerHTML = '<tr><td colspan="6">No hay registros para los filtros seleccionados.</td></tr>';
            ultimoRegistroId = null;
            if (btnFirmar) {
                btnFirmar.disabled = true;
            }
            return;
        }

        ultimoRegistroId = registros[0].id_registro;
        if (btnFirmar) {
            btnFirmar.disabled = !!registros[0].firmado;
        }

        tablaBody.innerHTML = registros.map((item) => {
            const estadoFirma = item.firmado
                ? `Firmado ${item.fecha_firma ? '(' + item.fecha_firma.slice(0, 10) + ')' : ''}`
                : 'Pendiente';
            return `
                <tr>
                    <td>${item.fecha || ''}</td>
                    <td>${item.curso || ''}</td>
                    <td>${item.asignatura || ''}</td>
                    <td>${item.numero_clase || ''}</td>
                    <td>${item.contenido_tratado || ''}</td>
                    <td>${estadoFirma}</td>
                </tr>
            `;
        }).join('');
    }

    async function listarRegistros() {
        clearStatus();
        const params = new URLSearchParams();
        if (claseInput.value) {
            params.set('clase_id', claseInput.value);
        }
        if (fechaInput.value) {
            params.set('fecha', fechaInput.value);
        }

        const response = await fetch(`${endpointList}?${params.toString()}`);
        const payload = await response.json();
        if (!response.ok || !payload.success) {
            renderRows([]);
            setStatus(payload.error || 'No se pudieron cargar registros.', true);
            return;
        }
        renderRows(payload.registros || []);
    }

    async function guardarRegistro() {
        clearStatus();
        if (!claseInput.value || !fechaInput.value || !contenidoInput.value.trim()) {
            setStatus('Clase, fecha y contenido tratado son obligatorios.', true);
            return;
        }

        const body = {
            clase_id: parseInt(claseInput.value, 10),
            fecha: fechaInput.value,
            numero_clase: parseInt(numeroClaseInput.value || '1', 10),
            contenido_tratado: contenidoInput.value.trim(),
            tarea_asignada: tareaInput.value.trim(),
            observaciones: observacionesInput.value.trim(),
        };

        const response = await fetch('/api/profesor/libro-clases/registro/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken'),
            },
            body: JSON.stringify(body),
        });

        const payload = await response.json();
        if (!response.ok || !payload.success) {
            setStatus(payload.error || 'No se pudo guardar el registro.', true);
            return;
        }

        setStatus('Registro guardado correctamente.');
        await listarRegistros();
    }

    async function firmarRegistro() {
        clearStatus();
        if (!ultimoRegistroId) {
            setStatus('No hay registro para firmar con los filtros actuales.', true);
            return;
        }

        const response = await fetch(`/api/profesor/libro-clases/${ultimoRegistroId}/firmar/`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken'),
            },
            body: '{}',
        });
        const payload = await response.json();
        if (!response.ok || !payload.success) {
            setStatus(payload.error || 'No se pudo firmar el registro.', true);
            return;
        }

        setStatus('Registro firmado exitosamente.');
        await listarRegistros();
    }

    function exportarSuperintendencia(format) {
        const month = (fechaInput.value || '').slice(0, 7);
        if (!month || month.length !== 7) {
            setStatus('Seleccione una fecha valida para exportar (YYYY-MM).', true);
            return;
        }
        window.location.href = `/api/reportes/superintendencia/?format=${format}&month=${month}`;
    }

    claseInput.addEventListener('change', listarRegistros);
    fechaInput.addEventListener('change', listarRegistros);
    if (btnGuardar) {
        btnGuardar.addEventListener('click', guardarRegistro);
    }
    if (btnFirmar) {
        btnFirmar.addEventListener('click', firmarRegistro);
    }
    if (btnExportCsv) {
        btnExportCsv.addEventListener('click', () => exportarSuperintendencia('csv'));
    }
    if (btnExportXlsx) {
        btnExportXlsx.addEventListener('click', () => exportarSuperintendencia('xlsx'));
    }
    if (btnExportPdf) {
        btnExportPdf.addEventListener('click', () => exportarSuperintendencia('pdf'));
    }
    if (btnExportSige) {
        btnExportSige.addEventListener('click', () => exportarSuperintendencia('sige'));
    }

    listarRegistros().catch(() => {
        setStatus('Error inesperado al inicializar la vista.', true);
    });
})();
</script>
