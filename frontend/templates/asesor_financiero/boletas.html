{% load static %}

<!-- BOLETAS - ASESOR FINANCIERO -->
<link rel="stylesheet" href="{% static 'css/asesor_financiero/boletas.css' %}">

<div class="asesor-financiero-page">
    <div class="page-header">
        <div>
            <h1>🧾 Generar Boletas</h1>
            <p class="text-muted">Emitir y consultar comprobantes de pago</p>
        </div>
        <button class="btn btn-primary" onclick="alert('Funcionalidad en desarrollo')">
            <i class="fas fa-plus"></i> Nueva Boleta
        </button>
    </div>

    <!-- Resumen de boletas -->
    <div class="boletas-summary">
        <div class="summary-item">
            <span class="summary-label">Boletas Hoy</span>
            <span class="summary-value" id="boletas-hoy-valor">0</span>
        </div>
        <div class="summary-item">
            <span class="summary-label">Este Mes</span>
            <span class="summary-value" id="boletas-mes-valor">0</span>
        </div>
        <div class="summary-item">
            <span class="summary-label">Monto Total</span>
            <span class="summary-value" id="monto-total-mes">$0</span>
        </div>
    </div>

    <!-- Lista de boletas -->
    <div class="content-card">
        <div class="card-header">
            <h3>📋 Boletas Recientes</h3>
            <div class="card-actions">
                <input type="text" placeholder="Buscar boleta..." class="search-input" id="busqueda-boletas">
                <select class="filter-select" id="filtro-mes">
                    <option value="">Todos los meses</option>
                    <option value="1-2026">Enero 2026</option>
                    <option value="12-2025">Diciembre 2025</option>
                    <option value="11-2025">Noviembre 2025</option>
                </select>
            </div>
        </div>
        <div class="card-body" id="boletas-content">
            <div class="empty-state">
                <i class="fas fa-receipt fa-3x text-muted mb-3"></i>
                <h3>No hay boletas emitidas</h3>
                <p class="text-muted">Las boletas generadas aparecerán aquí</p>
            </div>
        </div>
    </div>
</div>



<script>
document.addEventListener('DOMContentLoaded', function() {
    cargarEstadisticasBoletas();
    cargarBoletas();
    
    // Event listeners para filtros
    document.getElementById('busqueda-boletas').addEventListener('input', debounce(cargarBoletas, 500));
    document.getElementById('filtro-mes').addEventListener('change', cargarBoletas);
});

function cargarEstadisticasBoletas() {
    fetch('/api/asesor-financiero/boletas/estadisticas/')
        .then(function(response) {
            if (!response.ok) {
                throw new Error('Error en la respuesta del servidor');
            }
            return response.json();
        })
        .then(function(data) {
            if (data.success) {
                document.getElementById('boletas-hoy-valor').textContent = data.boletas_hoy;
                document.getElementById('boletas-mes-valor').textContent = data.boletas_mes;
                document.getElementById('monto-total-mes').textContent = '$' + formatearMonto(data.monto_total_mes);
            }
        })
        .catch(function(error) {
            console.error('Error al cargar estadísticas de boletas:', error);
        });
}

function cargarBoletas() {
    var busqueda = document.getElementById('busqueda-boletas').value;
    var filtroMes = document.getElementById('filtro-mes').value;
    
    var params = new URLSearchParams();
    if (busqueda) params.append('busqueda', busqueda);
    
    if (filtroMes) {
        var partes = filtroMes.split('-');
        params.append('mes', partes[0]);
        params.append('anio', partes[1]);
    }
    
    fetch('/api/asesor-financiero/boletas/?' + params.toString())
        .then(function(response) {
            if (!response.ok) {
                throw new Error('Error en la respuesta del servidor');
            }
            return response.json();
        })
        .then(function(data) {
            if (data.success) {
                mostrarBoletas(data.boletas);
            }
        })
        .catch(function(error) {
            console.error('Error al cargar boletas:', error);
        });
}

function mostrarBoletas(boletas) {
    var container = document.getElementById('boletas-content');
    
    if (boletas.length === 0) {
        container.innerHTML = '<div class="empty-state">' +
            '<i class="fas fa-receipt fa-3x text-muted mb-3"></i>' +
            '<h3>No hay boletas emitidas</h3>' +
            '<p class="text-muted">Las boletas generadas aparecerán aquí</p>' +
            '</div>';
        return;
    }
    
    var html = '<table class="boletas-table">' +
        '<thead>' +
        '<tr>' +
        '<th>N° Boleta</th>' +
        '<th>Receptor</th>' +
        '<th>Fecha</th>' +
        '<th>Monto</th>' +
        '<th>Estado</th>' +
        '<th>Acciones</th>' +
        '</tr>' +
        '</thead>' +
        '<tbody>';
    
    boletas.forEach(function(boleta) {
        var estadoClass = 'estado-' + boleta.estado.toLowerCase();
        
        html += '<tr>' +
            '<td><strong>' + boleta.numero_boleta + '</strong><br>' +
            '<small class="text-muted">' + boleta.tipo_boleta + '</small></td>' +
            '<td>' + boleta.nombre_receptor + '<br>' +
            '<small class="text-muted">' + boleta.rut_receptor + '</small></td>' +
            '<td>' + boleta.fecha_emision_formatted + '</td>' +
            '<td><strong>$' + formatearMonto(boleta.monto_total) + '</strong></td>' +
            '<td><span class="estado-badge ' + estadoClass + '">' + boleta.estado_display + '</span></td>' +
            '<td>';
        
        if (boleta.pdf_url) {
            html += '<button class="btn-pdf" onclick="window.open(\'' + boleta.pdf_url + '\', \'_blank\')">' +
                '<i class="fas fa-file-pdf"></i> Ver PDF' +
                '</button>';
        } else {
            html += '<span class="text-muted">Sin PDF</span>';
        }
        
        html += '</td></tr>';
    });
    
    html += '</tbody></table>';
    container.innerHTML = html;
}

function formatearMonto(monto) {
    return Math.round(monto).toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}

function debounce(func, wait) {
    var timeout;
    return function() {
        var context = this;
        var args = arguments;
        clearTimeout(timeout);
        timeout = setTimeout(function() {
            func.apply(context, args);
        }, wait);
    };
}
</script>
