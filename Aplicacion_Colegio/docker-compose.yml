version: '3.9'

services:
  web:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 backend.apps.core.routing:application
    env_file:
      - .env
    environment:
      DB_ENGINE: postgresql
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: colegio_db
      DB_USER: colegio_user
      DB_PASSWORD: colegio_password
      REDIS_URL: redis://redis:6379/0
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    healthcheck:
      test: ["CMD", "python", "manage.py", "check"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: colegio_db
      POSTGRES_USER: colegio_user
      POSTGRES_PASSWORD: colegio_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U colegio_user -d colegio_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
