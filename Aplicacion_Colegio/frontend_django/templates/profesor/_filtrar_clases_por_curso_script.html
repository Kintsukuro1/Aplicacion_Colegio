<script>
function filtrarClasesPorCurso(cursoId) {
    var claseSelect = document.getElementById('clase_id');
    if (!claseSelect) return;

    Array.from(claseSelect.options).forEach(function (opt) {
        if (!opt.value) {
            opt.hidden = false;
            return;
        }
        var visible = !cursoId || String(opt.dataset.cursoId || '') === String(cursoId);
        opt.hidden = !visible;
    });

    Array.from(claseSelect.querySelectorAll('optgroup')).forEach(function (group) {
        var anyVisible = Array.from(group.querySelectorAll('option')).some(function (o) {
            return o.value && !o.hidden;
        });
        group.hidden = !anyVisible;
    });
}

function syncCursoFromClase(claseSelect) {
    var cursoSelect = document.getElementById('filtro_curso_id');
    if (!cursoSelect || !claseSelect) return;
    var opt = claseSelect.options[claseSelect.selectedIndex];
    if (opt && opt.value && opt.dataset.cursoId) {
        cursoSelect.value = opt.dataset.cursoId;
        filtrarClasesPorCurso(opt.dataset.cursoId);
    }
}

function onClaseAsistenciaChange(claseSelect) {
    syncCursoFromClase(claseSelect);
    var form = document.getElementById('formFiltros');
    if (form) form.submit();
}

function onCursoAsistenciaChange(select) {
    var form = document.getElementById('formFiltros');
    var claseSelect = document.getElementById('clase_id');
    if (!form || !claseSelect) return;

    filtrarClasesPorCurso(select.value);
    claseSelect.value = '';
    form.submit();
}

function initAsistenciaFiltros() {
    var cursoFiltro = document.getElementById('filtro_curso_id');
    var claseSelect = document.getElementById('clase_id');
    if (!cursoFiltro || !claseSelect) return;

    if (cursoFiltro.value) {
        filtrarClasesPorCurso(cursoFiltro.value);
    } else if (claseSelect.value) {
        syncCursoFromClase(claseSelect);
    }
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initAsistenciaFiltros);
} else {
    initAsistenciaFiltros();
}
</script>
