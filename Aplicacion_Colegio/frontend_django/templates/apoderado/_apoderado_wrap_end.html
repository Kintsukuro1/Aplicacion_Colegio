<script>
(function () {
    var selector = document.getElementById('apodPupilSelector');
    if (!selector) return;
    selector.addEventListener('change', function () {
        var pagina = selector.getAttribute('data-pagina') || 'inicio';
        var estudianteId = selector.value;
        if (!estudianteId) return;
        var url = '/dashboard/?pagina=' + encodeURIComponent(pagina) + '&estudiante_id=' + encodeURIComponent(estudianteId);
        window.location.assign(url);
    });
})();
</script>
