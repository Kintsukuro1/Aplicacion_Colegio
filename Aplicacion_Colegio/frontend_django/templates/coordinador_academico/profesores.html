{% load static %}
<link rel="stylesheet" href="{% static 'css/coordinador_academico/profesores.css' %}">

<!-- PROFESORES - COORDINADOR ACADÉMICO -->

<div class="coordinador-dashboard">
    <div class="section-header">
        <h2><span class="section-icon">👨‍🏫</span> Profesores</h2>
    </div>
    <div class="table-responsive">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Profesor</th>
                    <th>Clases Activas</th>
                    <th>Última Actividad</th>
                </tr>
            </thead>
            <tbody>
                {% for item in profesores %}
                <tr>
                    <td>{{ item.profesor.get_full_name }}</td>
                    <td>{{ item.clases_activas }}</td>
                    <td>{{ item.ultima_actividad|date:"d/m/Y H:i"|default:"Sin actividad" }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3">No hay profesores registrados</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
