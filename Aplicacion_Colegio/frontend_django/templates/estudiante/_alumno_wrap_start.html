<script>
(function () {
    var current = (document.title || '').trim();
    if (current.indexOf('Portal Académico') !== -1) return;
    var r = '{{ rol|default:"estudiante"|lower }}';
    var titles = {
        estudiante: 'Portal Académico - Estudiante',
        alumno: 'Portal Académico - Estudiante',
        apoderado: 'Portal Académico - Apoderado',
        profesor: 'Portal Académico - Profesor',
        admin_escolar: 'Portal Académico - Administrador',
        admin: 'Portal Académico - Administrador',
        admin_general: 'Portal Académico - Administrador'
    };
    document.title = titles[r] || 'Portal Académico - Estudiante';
})();
</script>
