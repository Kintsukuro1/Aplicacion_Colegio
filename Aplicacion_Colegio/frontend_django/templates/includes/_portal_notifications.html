{# Campana y panel desplegable — requiere portal_notifications.css + notificaciones.js #}
<div class="notificaciones-container" data-csrf-token="{{ csrf_token }}">
    <button type="button" class="btn-notificaciones" id="btnNotificaciones" aria-label="Notificaciones" title="Notificaciones" aria-expanded="false" aria-haspopup="true">
        <svg class="btn-notificaciones__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </svg>
        <span class="badge-notificaciones d-none" id="badgeNotificaciones">0</span>
    </button>

    <div class="dropdown-notificaciones d-none" id="dropdownNotificaciones" role="dialog" aria-label="Lista de notificaciones">
        <div class="notif-header">
            <h3>Notificaciones</h3>
            <button type="button" class="btn-marcar-todas" id="btnMarcarTodas" title="Marcar todas como leídas">✓</button>
        </div>
        <div class="notif-lista" id="listNotificaciones">
            <div class="notif-loading">Cargando...</div>
        </div>
        <div class="notif-footer">
            <a href="{% url 'dashboard' %}?pagina=notificaciones" id="verTodasNotificaciones">Ver todas</a>
        </div>
    </div>
</div>
