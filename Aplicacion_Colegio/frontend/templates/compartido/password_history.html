<div class="content-wrapper">
    <div class="page-header">
        <h1>Password History</h1>
        <p class="subtitle">Auditoria de cambios de contrasena sin exponer hashes.</p>
    </div>

    <div id="pw-feedback" class="alert d-none"></div>

    <div class="card">
        <table class="table">
            <thead>
                <tr>
                    <th class="text-left">ID</th>
                    <th class="text-left">Usuario</th>
                    <th class="text-left">Rol</th>
                    <th class="text-left">RBD</th>
                    <th class="text-left">Fecha registro</th>
                </tr>
            </thead>
            <tbody id="pw-rows">
                <tr><td colspan="5">Cargando historial...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
(function () {
    const rowsEl = document.getElementById('pw-rows');
    const feedback = document.getElementById('pw-feedback');

    function notify(message, isError) {
        feedback.style.display = 'block';
        feedback.textContent = message;
        feedback.style.padding = '0.6rem';
        feedback.style.marginBottom = '0.75rem';
        feedback.style.borderRadius = '8px';
        feedback.style.border = isError ? '1px solid #d7acb5' : '1px solid #b8d8bf';
        feedback.style.background = isError ? '#f7ebee' : '#edf8f0';
        feedback.style.color = isError ? '#8f1d2c' : '#1e5f2f';
    }

    async function loadHistory() {
        rowsEl.innerHTML = '<tr><td colspan="5">Cargando historial...</td></tr>';
        try {
            const response = await fetch('/api/v1/seguridad/password-history/', {
                headers: { 'Accept': 'application/json' },
                credentials: 'same-origin',
            });
            const payload = await response.json();
            if (!response.ok) {
                notify(payload?.detail || 'No se pudo cargar password history.', true);
                rowsEl.innerHTML = '<tr><td colspan="5">Sin acceso a password history.</td></tr>';
                return;
            }

            const entries = Array.isArray(payload?.entries) ? payload.entries : [];
            if (!entries.length) {
                rowsEl.innerHTML = '<tr><td colspan="5">No hay registros de password history.</td></tr>';
                return;
            }

            rowsEl.innerHTML = '';
            entries.forEach((entry) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${entry.id}</td>
                    <td>${entry.user_email || '-'}</td>
                    <td>${entry.user_rol || '-'}</td>
                    <td>${entry.colegio_rbd || '-'}</td>
                    <td>${entry.created_at || '-'}</td>
                `;
                rowsEl.appendChild(tr);
            });
        } catch (_) {
            notify('No se pudo cargar password history.', true);
            rowsEl.innerHTML = '<tr><td colspan="5">No se pudo cargar password history.</td></tr>';
        }
    }

    loadHistory();
})();
</script>
