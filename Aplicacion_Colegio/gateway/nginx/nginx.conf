worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    gzip on;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss;

    # Rate limit por IP para rutas sensibles.
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=20r/m;
    limit_req_zone $binary_remote_addr zone=report_limit:10m rate=30r/m;

    map $http_x_request_id $request_id_out {
        default $http_x_request_id;
        ""      $request_id;
    }

    upstream django_upstream {
        server web:8000;
    }

    server {
        listen 80;
        server_name _;

        # TLS se habilita en staging/prod con certs montados por volumen.
        # listen 443 ssl;
        # ssl_certificate /etc/nginx/certs/fullchain.pem;
        # ssl_certificate_key /etc/nginx/certs/privkey.pem;

        client_max_body_size 20m;

        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=20 nodelay;
            proxy_set_header X-Request-ID $request_id_out;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
            proxy_pass http://django_upstream;
        }

        location /api/v1/uploads/ {
            limit_req zone=upload_limit burst=40 nodelay;
            proxy_set_header X-Request-ID $request_id_out;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
            proxy_pass http://django_upstream;
        }

        location /api/v1/reportes/ {
            limit_req zone=report_limit burst=60 nodelay;
            proxy_set_header X-Request-ID $request_id_out;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
            proxy_pass http://django_upstream;
        }

        location / {
            proxy_set_header X-Request-ID $request_id_out;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
            proxy_pass http://django_upstream;
        }
    }
}
