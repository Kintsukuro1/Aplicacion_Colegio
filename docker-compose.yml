version: '3.9'

services:
  web:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 backend.apps.core.routing:application
    env_file:
      - .env
    environment:
      DB_ENGINE: postgresql
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: colegio_db
      DB_USER: colegio_user
      DB_PASSWORD: colegio_password
      REDIS_URL: redis://redis:6379/0
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: colegio_db
      POSTGRES_USER: colegio_user
      POSTGRES_PASSWORD: colegio_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

volumes:
  postgres_data:
